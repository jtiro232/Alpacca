name: build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pinned llama.cpp (shallow)
        run: git submodule update --init --depth 1

      - name: Install gguf-py for the tiny test model
        run: |
          pip3 install numpy
          pip3 install --no-deps ./vendor/llama.cpp/gguf-py
        shell: bash

      - name: Configure
        # GGML_NATIVE=OFF: CI artifacts must not depend on the runner's CPU
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel 4
        shell: bash

      - name: Smoke test (offline mock registry + tiny model)
        run: bash tests/smoke.sh
        shell: bash
